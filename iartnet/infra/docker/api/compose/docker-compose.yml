# file: iartnet/infra/docker/api/compose/docker-compose.yml
name: iartnet-api

services:
  postgres:
    image: postgres:18-bookworm
    container_name: iartnet_postgres
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=2048MB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      # --- Integrazione per risolvere CPU 17% (WAL/Checkpoint) ---
      - "-c"
      - "max_wal_size=2GB"
      - "-c"
      - "min_wal_size=512MB"
      - "-c"
      - "checkpoint_timeout=15min"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "log_checkpoints=on"
      # NUOVI PARAMETRI AUTOVACUUM
      - "-c"
      - "autovacuum_vacuum_scale_factor=0.05"
      - "-c"
      - "autovacuum_analyze_scale_factor=0.05"
      - "-c"
      - "autovacuum_vacuum_cost_limit=2000"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iartnet1}
      POSTGRES_USER: ${POSTGRES_USER:-iartnet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - iartnet_pgdata:/var/lib/postgresql/data
      - /opt/Ingestion/iartnet/infra/docker/api/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - iartnet_net
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: iartnet_redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks:
      - iartnet_net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  api_app:
    build:
      context: ../../../../apps/api
      dockerfile: ../../infra/docker/api/php/Dockerfile
      args:
        APP_ENV: ${APP_ENV:-local}
    container_name: iartnet_api_app
    restart: unless-stopped
    env_file:
      - ../../../../apps/api/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      PHP_OPCACHE_ENABLE: ${PHP_OPCACHE_ENABLE:-1}
      IMAGES_ROOT: ${IMAGES_ROOT:?Set IMAGES_ROOT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iartnet_net
    volumes:
      - api_public:/var/www/html/public
      - api_storage:/var/www/html/storage
      - api_bootstrap_cache:/var/www/html/bootstrap/cache
      - ../../../../apps/api/storage/mapping/base:/var/www/html/storage/mapping/base:ro
      - ../../../../apps/api/storage/mapping/local:/var/www/html/storage/mapping/local
      # NOTE:
      # Keep both mappings unless the Laravel -> IIIF image copy flow is re-tested.
      # This layout fixed image visibility/copy issues between ingestion and Cantaloupe.
      - ${IMAGES_ROOT:?Set IMAGES_ROOT}:/srv/iartnet/iiif/images:rw
      - ${IIIF_IMAGES_DIR:?Set IIIF_IMAGES_DIR}:/srv/iartnet/iiif/images:rw
      - ${IARTNET_INGESTION_STORAGE_DIR:?Set IARTNET_INGESTION_STORAGE_DIR}:/var/www/html/storage/app/ingestion:rw
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null 2>&1 && php artisan --version >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 15s

  scheduler:
    build:
      context: ../../../../apps/api
      dockerfile: ../../infra/docker/api/php/Dockerfile
      args:
        APP_ENV: ${APP_ENV:-local}
    container_name: iartnet_api_scheduler
    env_file:
      - ../../../../apps/api/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      PHP_OPCACHE_ENABLE: ${PHP_OPCACHE_ENABLE:-1}
    command: ["php", "artisan", "schedule:work"]
    restart: unless-stopped
    depends_on:
      api_app:
        condition: service_healthy
    networks:
      - iartnet_net
    volumes:
      - api_storage:/var/www/html/storage
      - api_bootstrap_cache:/var/www/html/bootstrap/cache
      - ../../../../apps/api/storage/mapping/base:/var/www/html/storage/mapping/base:ro
      - ../../../../apps/api/storage/mapping/local:/var/www/html/storage/mapping/local
      - ${IIIF_IMAGES_DIR:?Set IIIF_IMAGES_DIR}:/srv/iartnet/iiif/images:rw
      - ${IARTNET_INGESTION_STORAGE_DIR:?Set IARTNET_INGESTION_STORAGE_DIR}:/var/www/html/storage/app/ingestion:rw

  worker:
    build:
      context: ../../../../apps/api
      dockerfile: ../../infra/docker/api/php/Dockerfile
      args:
        APP_ENV: ${APP_ENV:-local}
    # container_name: iartnet_api_worker
    env_file:
      - ../../../../apps/api/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      PHP_OPCACHE_ENABLE: ${PHP_OPCACHE_ENABLE:-1}
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=3", "--timeout=120", "--max-jobs=2000", "--backoff=30", "--max-time=3600"]
    restart: unless-stopped
    depends_on:
      api_app:
        condition: service_healthy
    networks:
      - iartnet_net
    volumes:
      - api_storage:/var/www/html/storage
      - api_bootstrap_cache:/var/www/html/bootstrap/cache
      - ../../../../apps/api/storage/mapping/base:/var/www/html/storage/mapping/base:ro
      - ../../../../apps/api/storage/mapping/local:/var/www/html/storage/mapping/local
      - ${IIIF_IMAGES_DIR:?Set IIIF_IMAGES_DIR}:/srv/iartnet/iiif/images:rw
      - ${IARTNET_INGESTION_STORAGE_DIR:?Set IARTNET_INGESTION_STORAGE_DIR}:/var/www/html/storage/app/ingestion:rw
    deploy:
      replicas: 3

  nginx:
    image: nginx:1.27-alpine
    container_name: iartnet_api_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:80"
    depends_on:
      api_app:
        condition: service_healthy
    networks:
      - iartnet_net
    volumes:
      - api_public:/var/www/html/public:ro
      - api_storage:/var/www/html/storage:ro
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s

networks:
  iartnet_net:
    name: iartnet_net
    external: true

volumes:
  iartnet_pgdata:
    name: iartnet_pgdata
  api_storage:
    name: iartnet_api_storage
  api_bootstrap_cache:
    name: iartnet_api_bootstrap_cache
  api_public:
    name: iartnet_api_public
