# file: /opt/Ingestion/iartnet/infra/docker/api/compose/docker-compose.libretranslate.yml
name: iartnet-api

services:
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: iartnet_libretranslate
    mem_limit: 5g
    mem_reservation: 4g
    memswap_limit: 5g
    mem_swappiness: 0
    restart: unless-stopped
    networks:
      - iartnet_net
    ports:
      - "127.0.0.1:${LT_PORT:?Set LT_PORT}:5000"
    environment:
      LT_HOST: "0.0.0.0"
      LT_PORT: "5000"
      # carica solo le lingue che ti servono (meno GB, meno RAM, meno tempo)
      LT_LOAD_ONLY: "${LT_LOAD_ONLY:-it,en}"
      # se ti serve solo API interna, spegni UI
      LT_DISABLE_WEB_UI: "true"
      # se un giorno lo esponi dietro proxy, usa API keys
      LT_API_KEYS: "${LT_API_KEYS:-true}"
      LT_THREADS: "2"

    volumes:
      # Persistenza modelli/cache (altrimenti riscarica mezzo mondo)
      - ${LT_SHARE_DIR:?Set LT_SHARE_DIR}:/home/libretranslate/.local/share
      - ${LT_CACHE_DIR:?Set LT_CACHE_DIR}:/home/libretranslate/.local/cache
      - ${LT_KEYS_DIR:?Set LT_KEYS_DIR}:/app/db

networks:
  iartnet_net:
    external: true
    name: iartnet_net
